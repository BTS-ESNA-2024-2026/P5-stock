# Kustomization for P5-Stock
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: p5stock

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - hpa.yaml
  - redis.yaml
  - ingress.yaml
  - network-policy.yaml
  - pdb.yaml

commonLabels:
  app.kubernetes.io/name: p5stock
  app.kubernetes.io/part-of: p5stock
  app.kubernetes.io/managed-by: kustomize

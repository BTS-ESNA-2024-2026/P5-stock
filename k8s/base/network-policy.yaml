# Network Policies for P5-Stock
# Issue #28: Security isolation

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: p5stock-app-policy
  namespace: p5stock
spec:
  podSelector:
    matchLabels:
      app: p5stock
      component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # Allow to Redis
    - to:
        - podSelector:
            matchLabels:
              component: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow to ProxySQL (MySQL)
    - to:
        - podSelector:
            matchLabels:
              component: proxysql
      ports:
        - protocol: TCP
          port: 6033
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
---
# Redis network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-policy
  namespace: p5stock
spec:
  podSelector:
    matchLabels:
      app: p5stock
      component: redis
  policyTypes:
    - Ingress
  ingress:
    # Allow from app pods only
    - from:
        - podSelector:
            matchLabels:
              app: p5stock
              component: web
      ports:
        - protocol: TCP
          port: 6379

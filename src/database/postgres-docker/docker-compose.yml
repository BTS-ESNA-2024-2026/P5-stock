services:
  postgres:
    image: postgres:17
    container_name: postgres_admin
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    ports:
      - "${POSTGRES_DOCKER_PORT:-5432}:5432"

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5STOCK - Connexion</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark">PSSTOCK</span>
                <span class="brand-sub">secure access</span>
            </div>
            <div class="top-actions">
                <span class="chip">Centre logistique</span>
                <span class="chip">Acces securise</span>
            </div>
        </header>

        <main class="auth">
            <div class="auth-card">
                <div class="auth-header">
                    <span class="brand-sub">Portail operationnel</span>
                    <div class="auth-title">Connexion</div>
                    <p class="subtitle">Acces au tableau de bord et a la supervision PSSTOCK.</p>
                </div>

                <div id="error-container" class="mb-2"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="username" class="form-label">Utilisateur</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            class="form-input"
                            required
                            autocomplete="username"
                            placeholder="ex: admin"
                            autofocus
                        >
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Mot de passe</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            required
                            autocomplete="current-password"
                            placeholder="********"
                        >
                    </div>

                    <div class="flex gap-1 mb-2" style="justify-content: space-between; align-items: center;">
                        <span class="brand-sub">Authentification chiffree</span>
                        <a href="#" class="subtitle" aria-label="Mot de passe oublie">Mot de passe oublie ?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;">
                        Se connecter
                    </button>
                </form>

                <div class="flex gap-1 mt-2" style="flex-wrap: wrap; justify-content: center;">
                    <span class="chip">Tracabilite active</span>
                    <span class="chip">Surveillance 24/7</span>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof TokenManager === 'undefined' || typeof api === 'undefined') {
                console.error("static/js/api.js ne s'est pas charge. Verifiez la route statique.");
                return;
            }

            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;

                loginBtn.textContent = 'Connexion en cours...';
                loginBtn.disabled = true;

                try {
                    const response = await api.login(username, password);

                    if (response.mfa_required) {
                        showError('MFA non encore implemente dans le frontend');
                        loginBtn.textContent = 'Se connecter';
                        loginBtn.disabled = false;
                    } else {
                        window.location.href = '/dashboard';
                    }
                } catch (error) {
                    showError(error.message || 'Erreur de connexion');
                    loginBtn.textContent = 'Se connecter';
                    loginBtn.disabled = false;
                }
            });

            if (TokenManager.isAuthenticated()) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>

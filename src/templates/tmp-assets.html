<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5STOCK - Connexion</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark">PSSTOCK</span>
                <span class="brand-sub">secure access</span>
            </div>
            <div class="top-actions">
                <span class="chip">Centre logistique</span>
                <span class="chip">Acces securise</span>
            </div>
        </header>

    <main class="asset">
        <form id="addAssetForm" action="/tmp-assets" method="POST">
                <div class="form-group">
                    <label for="type" class="form-label">Type of the asset</label>
                    <input
                            id="type"
                            name="type"
                            placeholder="type"
                    >
                </div>

                <div class="form-group">
                    <label for="name" class="form-label">name</label>
                    <input
                            id="name"
                            name="name"
                            placeholder="asset name"
                    >
                </div>

                <div class="form-group">
                    <label for="shelf" class="form-label">shelf</label>
                    <input
                            id="shelf"
                            name="shelf"
                            placeholder="shelf/precise location"
                    >

                <div class="form-group">
                    <label for="status" class="form-label">status</label>
                    <input
                            id="status"
                            name="status"
                            placeholder="status of the asset"
                    >
                </div>


                <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;">
                    create asset
                </button>
            </form>
        </main>
    </div>
    
</body>
</html>

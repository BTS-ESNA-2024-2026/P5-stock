<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P5STOCK - Connexion</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark">PSSTOCK</span>
                <span class="brand-sub">secure access</span>
            </div>
            <div class="top-actions">
                <span class="chip">Centre logistique</span>
                <span class="chip">Acces securise</span>
            </div>
        </header>

        <main class="auth">
            <a href="/auth/login">login</a>
            <a href="/dashboard">dashboard</a>
        </main>
    </div>
    <form id="loginForm" action="/tmp-assets" method="POST">
        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    placeholder="Email"
                    autocomplete="email"
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">Mot de passe</label>
            <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    placeholder="Votre mot de passe"
                    autocomplete="current-password"
            >
        </div>

        <div class="flex gap-1 mb-2" style="justify-content: space-between; align-items: center;">
            <span class="brand-sub">Authentification chiffree</span>
        </div>

        <button type="submit" class="btn btn-primary" id="loginBtn" style="width: 100%;">
            Se connecter
        </button>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets - P5STOCK</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark">PSSTOCK</span>
                <span class="brand-sub">ops board</span>
            </div>

            <nav class="nav-links">
                <a href="/dashboard" class="nav-link">Dashboard</a>
                <a href="/assets" class="nav-link active">Assets</a>
                <a href="/missions" class="nav-link">Missions</a>
                <a href="/users" class="nav-link">Utilisateurs</a>
                <a href="/reports" class="nav-link">Rapports</a>
            </nav>

            <div class="top-actions">
                <div class="chip">
                    <span id="userAvatar" class="icon-btn" style="width: 34px; height: 34px; box-shadow: none;">A</span>
                    <div style="display: flex; flex-direction: column; line-height: 1.2;">
                        <span id="userName" style="color: var(--text);">Admin</span>
                        <small id="userRole" style="color: var(--muted); font-weight: 600;">ADMIN</small>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm" onclick="logout()">Deconnexion</button>
            </div>
        </header>

        <main class="content">
            <section class="page-hero">
                <div class="page-meta">
                    <span class="brand-sub">Inventaire</span>
                    <div class="title">Gestion des assets</div>
                    <div class="subtitle">Filtrer, creer et superviser les equipements.</div>
                </div>
                <div class="controls-row">
                    <span class="chip">Flux en direct</span>
                    <button class="btn btn-primary btn-sm" onclick="showCreateModal()">+ Nouvel asset</button>
                </div>
            </section>

            <div id="error-container"></div>
            <div id="success-container"></div>

            <section class="panel">
                <div class="panel-header">
                    <div class="panel-title">Filtres</div>
                    <div class="search-bar" style="width: min(360px, 100%);">
                        <span style="opacity: 0.6;">&#9776;</span>
                        <input
                            type="text"
                            id="searchInput"
                            placeholder="Rechercher un asset"
                            aria-label="Rechercher un asset"
                            onkeyup="searchAssets()"
                        >
                    </div>
                </div>
                <div class="filters">
                    <select id="assetTypeFilter" class="form-select" onchange="loadAssets()">
                        <option value="">Selectionner un type</option>
                    </select>
                    <select id="statusFilter" class="form-select" onchange="loadAssets()">
                        <option value="">Tous les statuts</option>
                        <option value="AVAILABLE">Disponible</option>
                        <option value="IN_USE">En utilisation</option>
                        <option value="MAINTENANCE">Maintenance</option>
                    </select>
                </div>
            </section>

            <section class="data-table">
                <div class="table-header">
                    <h3>Liste des assets</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Numero</th>
                            <th>Nom</th>
                            <th>Type</th>
                            <th>Statut</th>
                            <th>Localisation</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="assetsTable">
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </section>
        </main>
    </div>

    <div class="modal" id="assetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nouvel asset</h3>
                <button class="modal-close" onclick="closeModal()" aria-label="Fermer">&times;</button>
            </div>

            <form id="assetForm">
                <input type="hidden" id="assetId">
                <input type="hidden" id="currentAssetType">

                <div class="form-group">
                    <label class="form-label">Type d'asset *</label>
                    <select id="assetType" class="form-select" required>
                        <option value="">Selectionner un type</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Nom *</label>
                    <input type="text" id="assetName" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Numero *</label>
                    <input type="text" id="assetNumber" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Statut</label>
                    <select id="assetStatus" class="form-select">
                        <option value="AVAILABLE">Disponible</option>
                        <option value="IN_USE">En utilisation</option>
                        <option value="MAINTENANCE">Maintenance</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Batiment</label>
                    <input type="number" id="roomId" class="form-input" placeholder="ID du local">
                </div>

                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Enregistrer</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeModal()">Annuler</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Assets - SGLM</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SGLM</h2>
                <p>Logistique Militaire</p>
            </div>

            <nav class="sidebar-nav">
                <a href="/dashboard" class="nav-item">
                    <span>📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/assets" class="nav-item active">
                    <span>📦</span>
                    <span>Assets</span>
                </a>
                <a href="/missions" class="nav-item">
                    <span>🎯</span>
                    <span>Missions</span>
                </a>
                <a href="/users" class="nav-item">
                    <span>👥</span>
                    <span>Utilisateurs</span>
                </a>
                <a href="/reports" class="nav-item">
                    <span>📈</span>
                    <span>Rapports</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">A</div>
                    <div>
                        <div id="userName" style="font-weight: bold; margin-bottom: 2px;">Admin</div>
                        <div id="userRole" style="font-size: 0.75rem; opacity: 0.8;">ADMIN</div>
                    </div>
                </div>
                <button class="btn btn-danger btn-sm" style="width: 100%;" onclick="logout()">
                    Déconnexion
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Gestion des Assets</h1>
                <button class="btn btn-primary btn-sm" onclick="showCreateModal()">
                    ➕ Nouvel Asset
                </button>
            </div>

            <div id="error-container"></div>
            <div id="success-container"></div>

            <!-- Filters -->
            <div class="data-table mb-3">
                <div class="table-header">
                    <h3>Filtres</h3>
                </div>
                <div style="padding: 1.5rem;">
                    <div class="flex gap-2">
                        <select id="assetTypeFilter" class="form-input" style="flex: 1;" onchange="loadAssets()">
                            <option value="">Sélectionner un type</option>
                        </select>
                        <select id="statusFilter" class="form-input" style="flex: 1;" onchange="loadAssets()">
                            <option value="">Tous les statuts</option>
                            <option value="AVAILABLE">Disponible</option>
                            <option value="IN_USE">En utilisation</option>
                            <option value="MAINTENANCE">Maintenance</option>
                        </select>
                        <input type="text" id="searchInput" class="form-input" style="flex: 2;" placeholder="Rechercher..." onkeyup="searchAssets()">
                    </div>
                </div>
            </div>

            <!-- Assets Table -->
            <div class="data-table">
                <div class="table-header">
                    <h3>Liste des Assets</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Numéro</th>
                            <th>Nom</th>
                            <th>Type</th>
                            <th>Statut</th>
                            <th>Localisation</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="assetsTable">
                        <tr>
                            <td colspan="6" class="text-center">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="pagination" id="pagination"></div>
            </div>
        </main>
    </div>

    <!-- Modal Create/Edit Asset -->
    <div class="modal" id="assetModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nouvel Asset</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <form id="assetForm">
                <input type="hidden" id="assetId">
                <input type="hidden" id="currentAssetType">

                <div class="form-group">
                    <label class="form-label">Type d'Asset *</label>
                    <select id="assetType" class="form-input" required>
                        <option value="">Sélectionner un type</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Nom *</label>
                    <input type="text" id="assetName" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Numéro *</label>
                    <input type="text" id="assetNumber" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Statut</label>
                    <select id="assetStatus" class="form-input">
                        <option value="AVAILABLE">Disponible</option>
                        <option value="IN_USE">En utilisation</option>
                        <option value="MAINTENANCE">Maintenance</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Bâtiment</label>
                    <input type="number" id="roomId" class="form-input" placeholder="ID du local">
                </div>

                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary" style="flex: 1;">Enregistrer</button>
                    <button type="button" class="btn btn-secondary" style="flex: 1;" onclick="closeModal()">Annuler</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script>
        // Vérifier l'authentification
        if (!TokenManager.isAuthenticated()) {
            window.location.href = '/login';
        }

        const user = TokenManager.getUser();
        if (user) {
            document.getElementById('userName').textContent = user.name || user.username;
            document.getElementById('userRole').textContent = user.role;
            document.getElementById('userAvatar').textContent = (user.name || user.username).charAt(0).toUpperCase();
        }

        async function logout() {
            if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
                await api.logout();
            }
        }

        let currentPage = 1;
        let assetTypes = [];

        // Charger les types d'assets
        async function loadAssetTypes() {
            try {
                const data = await api.getAssetTypes();
                assetTypes = data.asset_types;

                const typeFilter = document.getElementById('assetTypeFilter');
                const typeSelect = document.getElementById('assetType');

                assetTypes.forEach(type => {
                    const option1 = new Option(type.type, type.type);
                    const option2 = new Option(type.type, type.type);
                    typeFilter.add(option1);
                    typeSelect.add(option2);
                });
            } catch (error) {
                showError('Erreur lors du chargement des types: ' + error.message);
            }
        }

        // Charger les assets
        async function loadAssets(page = 1) {
            const typeFilter = document.getElementById('assetTypeFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            if (!typeFilter) {
                document.getElementById('assetsTable').innerHTML = `
                    <tr><td colspan="6" class="text-center">Veuillez sélectionner un type d'asset</td></tr>
                `;
                return;
            }

            try {
                const filters = { page };
                if (statusFilter) filters.status = statusFilter;

                const data = await api.getAssets(typeFilter, page, filters);
                displayAssets(data.assets);
                displayPagination(data.pagination);
            } catch (error) {
                showError('Erreur lors du chargement des assets: ' + error.message);
            }
        }

        function displayAssets(assets) {
            const table = document.getElementById('assetsTable');

            if (assets.length === 0) {
                table.innerHTML = `<tr><td colspan="6" class="text-center">Aucun asset trouvé</td></tr>`;
                return;
            }

            table.innerHTML = assets.map(asset => `
                <tr>
                    <td>${asset.number}</td>
                    <td>${asset.nom}</td>
                    <td><span class="badge badge-info">${asset.type}</span></td>
                    <td>${getStatusBadge(asset.status)}</td>
                    <td>${asset.room ? `Bâtiment ${asset.room.building} - ${asset.room.room}` : '-'}</td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editAsset(${asset.id}, '${asset.type}')">✏️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteAsset(${asset.id}, '${asset.type}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusBadge(status) {
            const badges = {
                'AVAILABLE': '<span class="badge badge-success">Disponible</span>',
                'IN_USE': '<span class="badge badge-warning">En utilisation</span>',
                'MAINTENANCE': '<span class="badge badge-danger">Maintenance</span>'
            };
            return badges[status] || status;
        }

        function displayPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            let html = '';

            for (let i = 1; i <= pagination.pages; i++) {
                html += `<button class="${i === pagination.page ? 'active' : ''}" onclick="loadAssets(${i})">${i}</button>`;
            }

            paginationDiv.innerHTML = html;
        }

        function showCreateModal() {
            document.getElementById('modalTitle').textContent = 'Nouvel Asset';
            document.getElementById('assetForm').reset();
            document.getElementById('assetId').value = '';
            document.getElementById('assetModal').classList.add('active');
        }

        async function editAsset(id, type) {
            try {
                const data = await api.getAsset(type, id);
                const asset = data.asset;

                document.getElementById('modalTitle').textContent = 'Modifier Asset';
                document.getElementById('assetId').value = asset.id;
                document.getElementById('currentAssetType').value = asset.type;
                document.getElementById('assetType').value = asset.type;
                document.getElementById('assetType').disabled = true;
                document.getElementById('assetName').value = asset.nom;
                document.getElementById('assetNumber').value = asset.number;
                document.getElementById('assetStatus').value = asset.status;
                document.getElementById('roomId').value = asset.room ? asset.room.id : '';

                document.getElementById('assetModal').classList.add('active');
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        }

        async function deleteAsset(id, type) {
            if (confirm('Êtes-vous sûr de vouloir supprimer cet asset ?')) {
                try {
                    await api.deleteAsset(type, id);
                    showSuccess('Asset supprimé avec succès');
                    loadAssets(currentPage);
                } catch (error) {
                    showError('Erreur: ' + error.message);
                }
            }
        }

        function closeModal() {
            document.getElementById('assetModal').classList.remove('active');
            document.getElementById('assetType').disabled = false;
        }

        document.getElementById('assetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const assetId = document.getElementById('assetId').value;
            const assetType = document.getElementById('currentAssetType').value || document.getElementById('assetType').value;

            const assetData = {
                nom: document.getElementById('assetName').value,
                number: document.getElementById('assetNumber').value,
                status: document.getElementById('assetStatus').value,
                room_id: parseInt(document.getElementById('roomId').value) || null
            };

            try {
                if (assetId) {
                    await api.updateAsset(assetType, assetId, assetData);
                    showSuccess('Asset modifié avec succès');
                } else {
                    await api.createAsset(assetType, assetData);
                    showSuccess('Asset créé avec succès');
                }

                closeModal();
                loadAssets(currentPage);
            } catch (error) {
                showError('Erreur: ' + error.message);
            }
        });

        function searchAssets() {
            // TODO: Implement search
            loadAssets(1);
        }

        // Charger au démarrage
        loadAssetTypes();
    </script>
</body>
</html>
